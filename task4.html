<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task 4 - Promise vs Async/Await</title>
</head>
<body>
  <h2>Promise vs Async/Await</h2>
  <p id="promiseOutput">Loading...</p>
  <p id="asyncOutput">Loading...</p>

  <script>
    // Method 1: Using Promise (.then chaining)
    function getUserWithPromise() {
      fetch("https://jsonplaceholder.typicode.com/users/1")
        .then((response) => response.json())
        .then((data) => {
          console.log("Promise style:", data.name);
          document.getElementById("promiseOutput").innerText =
            "Promise style: " + data.name;
        })
        .catch((error) => console.log("Error:", error));
    }
    getUserWithPromise();

    // Method 2: Using Async/Await (cleaner and more readable)
    async function getUserWithAsync() {
      let response = await fetch("https://jsonplaceholder.typicode.com/users/1");
      let data = await response.json();
      console.log("Async/Await style:", data.name);
      document.getElementById("asyncOutput").innerText =
        "Async/Await style: " + data.name;
    }
    getUserWithAsync();
  </script>
</body>
</html>
