<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random User Profile App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    width:350px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:center;
}

img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #3498db;
    margin-bottom:15px;
}

h2{
    margin-bottom:10px;
}

p{
    margin:8px 0;
    color:#555;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#3498db;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}
</style>

</head>
<body>

<div class="card">

<img id="profilePic" src="https://via.placeholder.com/120" alt="Profile">

<h2 id="fullName">Loading...</h2>

<p id="email"></p>
<p id="phone"></p>
<p id="country"></p>

<button onclick="loadUser()">Load New User</button>

</div>

<script>

async function loadUser(){

    try{

        const response = await fetch("https://randomuser.me/api/");

        if(!response.ok){
            throw new Error("Unable to fetch user data.");
        }

        const data = await response.json();

        const user = data.results[0];

        document.getElementById("profilePic").src = user.picture.large;

        document.getElementById("fullName").textContent =
        `${user.name.title} ${user.name.first} ${user.name.last}`;

        document.getElementById("email").textContent =
        `Email: ${user.email}`;

        document.getElementById("phone").textContent =
        `Phone: ${user.phone}`;

        document.getElementById("country").textContent =
        `Country: ${user.location.country}`;

    }

    catch(error){

        alert(error.message);
        console.error(error);

    }

}

window.onload = loadUser;

</script>

</body>
</html>
